services:

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darwin
      POSTGRES_PASSWORD: darwin
      POSTGRES_DB: darwin_test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darwin -d darwin_test_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  bot-service-test:
    build:
      context: ./bot-service
      target: test
    command: >
      sh -c "pytest -v --tb=short"
    env_file: ./bot-service/.env.test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://darwin:darwin@postgres-test:5432/darwin_test_db

  connector-service-test:
    build:
      context: ./connector-service
      target: test
    command: npm test
    env_file: ./connector-service/.env.test
